agent:
  type: dummy
  ckpt: /tmp/recondreamer_framework_smoke/dummy_agent_init.ckpt

train:
  algo: ppo
  policy_lr: 0.001
  lr_value: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  epochs: 1
  minibatch_size: 2
  max_grad_norm: 0.5
  actor_learner:
    mode: async
    buffer_dir: /tmp/recondreamer_framework_smoke/actor_learner
    learner_gpu_id: 0
    num_actors: 1
    shards_per_update: 1
    max_inflight_per_actor: 1
    max_updates: 1
    poll_interval_s: 0.01
