# Resume the interrupted layered-reward overnight run from buffer version 26.
# This config keeps the existing actor-learner buffer so the learner can
# continue from `outputs/actor_learner_reinforcepp_overnight_safe/weights/latest.ckpt`
# and finish the remaining updates before HUGSIM-ORI evaluation.

env:
  max_steps: 36
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  require_ckpt: true
  scene_sampling: random
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  reward:
    mode: step_path
    dt: 0.5
    path:
      interp_ds_m: 0.25
      w_progress: 1.0
      progress_forward_cap_m: 2.0
      progress_backward_cap_m: 0.5
      w_completion_ratio: 0.5
      completion_ratio_power: 2.0
      w_lateral: 0.2
      lateral_free_m: 0.5
      lateral_huber_delta_m: 0.75
      w_yaw: 0.08
      yaw_free_deg: 8.0
      yaw_huber_delta_deg: 15.0
      severe_lateral_error_m: 3.0
      severe_yaw_error_deg: 30.0
      severe_gate_scale: 0.0
      w_anchor_progress: 0.0
      w_anchor_lateral: 0.0
      anchor_free_m: 0.2
      anchor_cap_m: 1.0
    comfort:
      w_longitudinal_jerk: 0.01
      longitudinal_jerk_free: 1.5
      longitudinal_jerk_delta: 2.0
      w_yaw_jerk: 0.01
      yaw_jerk_free: 0.2
      yaw_jerk_delta: 0.3
      jerk_clip: 50.0
    collision:
      mode: constraint_gate
      gate_scale: 0.0
      w_static: 5.0
      w_dynamic: 5.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 6.5
      yaw_err_deg_max: 60.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      penalty: -12.0
      success_bonus: 12.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 8
      xz_err_patience_steps: 2
      xy_err_patience_steps: 2

train:
  wandb:
    enabled: true
    project: ReconDiff
    group: reinforcepp_closed_loop_sparsedrive_v2_resume_v26_primary

  algo: reinforcepp
  eta: 1.0
  mode_idx: -1
  policy_mode_select: sample
  policy_execute_mode: first_step
  max_grad_norm: 0.5
  policy_lr: 1.0e-5
  clip_eps: 0.2

  actor_learner:
    mode: async
    buffer_dir: outputs/actor_learner_reinforcepp_overnight_safe
    learner_gpu_id: 0
    actor_gpu_pool: [1, 2, 3]
    actors_per_gpu: 4
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 32
    num_envs_per_actor: 1
    vec_env_mode: serial
    max_shard_version_lag: 2
    shards_per_update: 24
    poll_interval_s: 0.1
    shard_collect_timeout_s: 60
    max_updates: 7

  minibatch_size: 4
  gamma: 0.99

  ddp:
    grad_accum_steps: 8

  grpo:
    enable: true
    config_path: null
    coef: 0.08
    num_candidates: 12
    candidate_select: topk
    norm_eps: 1.0e-6
    use_rank_adv: true
    score_clip: null
    debug_visualize: false
    debug_dir: outputs/visualize/grpo_nuscenes_reinforce_resume_v26_primary
    debug_max_batches: 0
    debug_top_k: 8

  reinforcepp:
    norm_eps: 1.0e-8
    kl_coef: 0.0
    epochs: 1
    forward_kl_coef: 0.2
    reverse_kl_coef: 0.5
    distill_temperature: 1.0

agent:
  type: sparsedrive_v2
  ckpt: SparseDriveV2/ckpt/sparsedrive_navsimv2.ckpt
  trainable_prefixes: [_trajectory_head.decoder.layers.1.metric_heads]
  nuscenes_scorer:
    backend: nuscenes_pdm
    scene_cache_root: /root/clone/ReconDreamer-RL/assets/nus/cache
    ea_gate_enabled: false
    driving_direction_gate_enabled: true
    progress_weight: 6.0
    ttc_weight: 5.0
    lane_keeping_weight: 1.0
    history_comfort_weight: 2.0
