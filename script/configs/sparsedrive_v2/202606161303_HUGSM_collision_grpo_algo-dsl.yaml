env:
  backend: hugsim_ori
  max_steps: 36
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  scene_sampling: random
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  hugsim:
    repo: /root/clone/HUGSIM-ORI
    scenario_dir: /root/clone/HUGSIM-ORI/configs/scenarios/nuscenes
    base_path: /root/clone/HUGSIM-ORI/configs/sim/nuscenes_eval_sparsedrive_v2_ppo_grpo_ver14.yaml
    camera_path: /root/clone/HUGSIM-ORI/configs/sim/nuscenes_camera.yaml
    kinematic_path: /root/clone/HUGSIM-ORI/configs/sim/kinematic.yaml
    model_base: /OpenDataset/HUGSIM_data/scenes/nuscenes
    launch_mode: fifo
    pixi_cmd: pixi
    fifo_timeout_s: 300
    fifo_poll_interval_s: 0.2
    output_root: outputs/hugsim_rl
    recon_data_root: /root/clone/ReconDreamer-RL/assets/nus/data
    nuscenes_root: /root/clone/ReconDreamer-RL/assets/nuscenes/v1.0-trainval
    frame2token_dir: /root/clone/ReconDreamer-RL/assets/nus/information/frame2token
    alignment:
      enabled: true
      max_rmse_m: 2.0
      use_recon_cache_objects: true
      use_hugsim_inserted_objects: true
    substeps_per_rl_step: 1
  reward:
    mode: step_path
    craft_close_loop:
      dt: 0.5
      CRAFT:
        enable: false
        real_reward_model: close loop
        off_global_route_threshold_m: 3.0
        lateral_safe_m: 0.25
        lateral_max_m: 3.5
        heading_max_deg: 75.0
        progress_weight: 0.0
        progress_max_m: 1.2
        progress_min_m: 0.0
        w_g: 0.0
        w_c: 0.0
        w_h: 0.0
        efficiency_floor: 0.15
        ddev_clip: 0.3
        k_g: 0.0
        k_c: 0.0
        k_h: 0.0
        correction_apply_thresh_global: 0.05
        correction_apply_thresh_center: 0.05
        correction_apply_thresh_heading: 0.05
        correction_clip: 0.5
        cost_off_road: 0.0
        cost_opposite_lane: 0.0
        cost_off_global_route: 0.0
        cost_emergency_lane: 0.0
        cost_red_light: 0.0
        cost_stop_sign: 0.0
        term_collision: 0.0
        collision_cost_static: null
        collision_cost_dynamic: null
        severe_lateral_error_m: null
        severe_lateral_cost: 0.0
        severe_heading_error_deg: null
        severe_heading_cost: 0.0
        term_route_dev: 0.0
        reward_completed: 0.0
        map:
          center_dev_max_m: 2.0
          heading_dev_max_deg: 90.0
          off_global_route_threshold_m: 3.0
          reverse_dot_threshold: -0.5
          same_dir_dot_threshold: 0.2
          same_dir_distance_margin_m: 0.75
          opposite_min_lateral_m: 0.0
      ea:
        enable: false
        weight: 0.0
      logging:
        wandb:
          enable: true
          prefix: rl
      terminal:
        enable: true
        xz_err_m_max: 25.0
        yaw_err_deg_max: 45.0
        terminate_on_xz_err: true
        terminate_on_yaw_err: true
        terminate_on_static_collision: true
        terminate_on_dynamic_collision: true
        yaw_err_patience_steps: 5
        xy_err_patience_steps: 4
        penalty: 0.0
        success_bonus: 0.0
        apply_on_failure: true
        apply_on_timeout: false
        apply_on_env_done: false
    craft_sparse_loop:
      dt: 0.5
      CRAFT:
        enable: false
        real_reward_model: corrective
        off_global_route_threshold_m: 6.0
        lateral_safe_m: 0.2
        lateral_max_m: 3.0
        heading_max_deg: 60.0
        corrective_progress:
          enable: false
          weight: 0.0
          max_m: 1.2
          min_m: 0.0
          lateral_safe_m: 0.3
          lateral_max_m: 2.5
          heading_max_deg: 60.0
          w_lateral_efficiency: 0.0
          w_heading_efficiency: 0.0
          efficiency_floor: 0.0
        corrective:
          cost_off_road: 0.0
          cost_emergency_lane: 0.0
          cost_off_global_route: 0.0
          cost_red_light: 0.0
          cost_stop_sign: 0.0
          cost_collision: 0.0
        map:
          center_dev_max_m: 2.0
          heading_dev_max_deg: 90.0
          off_global_route_threshold_m: 6.0
          reverse_dot_threshold: -0.5
          same_dir_dot_threshold: 0.2
          same_dir_distance_margin_m: 0.75
          opposite_min_lateral_m: 0.0
      ea:
        enable: false
        weight: 0.0
      logging:
        wandb:
          enable: true
          prefix: rl
      terminal:
        enable: true
        xz_err_m_max: 25.0
        yaw_err_deg_max: 45.0
        terminate_on_xz_err: true
        terminate_on_yaw_err: true
        terminate_on_static_collision: true
        terminate_on_dynamic_collision: true
        yaw_err_patience_steps: 5
        xy_err_patience_steps: 4
        penalty: 0.0
        success_bonus: 0.0
        apply_on_failure: true
        apply_on_timeout: false
        apply_on_env_done: false
    step_path:
      dt: 0.5
      CRAFT:
        enable: false
      path:
        interp_ds_m: 0.25
        w_progress: 100.0
        progress_forward_cap_m: 2.0
        progress_backward_cap_m: 0.5
        w_lateral: 0.0
        lateral_free_m: 0.3
        lateral_huber_delta_m: 0.5
        w_yaw: 0.0
        yaw_free_deg: 5.0
        yaw_huber_delta_deg: 10.0
        severe_gate_scale: 0.0
        severe_lateral_error_m: null
        severe_lateral_cost: 0.0
        severe_yaw_error_deg: null
        severe_yaw_cost: 0.0
      comfort:
        w_longitudinal_jerk: 0.0
        longitudinal_jerk_free: 1.5
        longitudinal_jerk_delta: 2.0
        w_yaw_jerk: 0.0
        yaw_jerk_free: 0.2
        yaw_jerk_delta: 0.3
        jerk_clip: 50.0
      collision:
        mode: dense_penalty
        w_static: 50.0
        w_dynamic: 50.0
        gate_scale: 0.0
      safety:
        enable: false
        lookahead_m: 15.0
        corridor_half_width_m: 2.5
        safe_gap_m: 8.0
        safe_ttc_s: 3.0
        w_clearance: 1.0
        w_ttc: 1.0
        progress_gate_strength: 1.0
        min_progress_gate: 0.3
      ea:
        enable: false
        weight: 0.0
      logging:
        wandb:
          enable: true
          prefix: rl
      terminal:
        enable: true
        xz_err_m_max: 25.0
        yaw_err_deg_max: 45.0
        terminate_on_xz_err: true
        terminate_on_yaw_err: true
        terminate_on_static_collision: true
        terminate_on_dynamic_collision: true
        yaw_err_patience_steps: 5
        xy_err_patience_steps: 4
        penalty: 0.0
        success_bonus: 0.0
        apply_on_failure: true
        apply_on_timeout: false
        apply_on_env_done: false
train:
  algo: reinforcepp-grpo-noaux
  wandb:
    enabled: true
    project: reconSparse
    group: HUGSIM_202606161303_Collision_ReinforcePP_GRPO_NoAux
  actor_learner:
    mode: async
    buffer_dir: /root/clone/ReconDreamer-RL/outputs/actor_learner/HUGSIM_202606161303_Collision_ReinforcePP_GRPO_NoAux
    timestamp_buffer_dir: true
    learner_gpu_id: 0
    learner_gpu_ids:
    - 0
    - 1
    - 2
    - 3
    actor_gpu_pool:
    - 4
    - 5
    - 6
    - 7
    actors_per_gpu: 12
    auto_max_inflight_per_actor: false
    max_inflight_per_actor: 3
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 32
    num_envs_per_actor: 1
    vec_env_mode: serial
    max_shard_version_lag: 2
    variable_shard_on_done: true
    samples_per_update: 768
    shards_per_update: 48
    poll_interval_s: 0.1
    shard_collect_timeout_s: 240
    actor_shard_stall_timeout_s: 900
    allow_partial_updates_after_timeout: true
    restart_failed_actors: true
    max_actor_restarts: 2
    max_updates: 32
  ddp:
    grad_accum_steps: 1
  eta: 1.0
  mode_idx: -1
  policy_mode_select: sample
  policy_execute_mode: first_step
  policy_lr: 0.0001
  weight_decay: 0.0
  max_grad_norm: 0.5
  minibatch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  closed_loop:
    reinforcepp:
      norm_eps: 1.0e-08
      kl_coef: 0.03
      epochs: 1
      policy_grad_weight: 1.0
      forward_kl_coef: 0.01
      reverse_kl_coef: 0.01
      distill_temperature: 1.0
    ppo:
      value_clip_eps: 0.0
      kl_coef: 0.03
      forward_kl_coef: 0.01
      reverse_kl_coef: 0.01
      distill_temperature: 1.0
    sac:
      entropy_coef: 0.01
      kl_coef: 0.03
      epochs: 1
      norm_eps: 1.0e-08
      forward_kl_coef: 0.01
      reverse_kl_coef: 0.01
      distill_temperature: 1.0
  grpo:
    enable: true
    config_path: null
    coef: 2.0
    num_candidates: 16
    candidate_select: topk
    objective: expected_prob
    temperature: 1.0
    norm_eps: 1.0e-06
    use_rank_adv: false
    score_clip: null
    debug_visualize: false
    debug_dir: outputs/visualize/HUGSIM_202606161303_Collision_ReinforcePP_GRPO_NoAux
    debug_max_batches: 24
    debug_top_k: 8
    scorer:
      backend: craft_carl
      scene_cache_root: /root/clone/ReconDreamer-RL/assets/nus/cache
      ea_gate_enabled: false
      driving_direction_gate_enabled: false
      center_dev_max_m: 2.0
      heading_dev_max_deg: 90.0
      off_global_route_threshold_m: 3.0
      carl:
        dp_min: 0.0
        dp_max: 1.2
        w_prog: 10.0
        w_g: 2.0
        w_c: 0.0
        w_h: 1.5
        efficiency_floor: 0.15
        ddev_clip: 0.3
        k_g: 0.35
        k_c: 0.0
        k_h: 0.5
        correction_apply_thresh_global: 0.05
        correction_apply_thresh_center: 0.05
        corr_clip: 0.5
        cost_off_road: 4.0
        cost_opposite_lane: 0.5
        cost_off_global_route: 3.0
        cost_emergency_lane: 2.0
        term_collision: 35.0
        term_route_dev: 35.0
        term_red_light: 8.0
        term_stop_sign: 8.0
  auxiliary:
    enable: false
    risk_decel:
      enable: false
      coef: 0.0
      dt_s: 0.5
      high_risk_gap_m: 10.0
      high_risk_ttc_s: 2.5
      lateral_m: 2.5
      speed_margin_mps: 0.15
      eps: 1.0e-06
agent:
  type: sparsedrive_v2
  ckpt: SparseDriveV2/ckpt/sparsedrive_navsimv2.ckpt
  trainable_prefixes:
  - _trajectory_head.decoder.layers.1.metric_heads
  frozen_prefixes:
  - _backbone
