env:
  backend: hugsim_ori
  max_steps: 36
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  scene_sampling: random
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  hugsim:
    repo: third_party/HUGSIM-ORI
    scenario_dir: third_party/HUGSIM-ORI/configs/scenarios/nuscenes
    base_path: third_party/HUGSIM-ORI/configs/sim/nuscenes_eval_sparsedrive_v2_ppo_grpo_ver14.yaml
    camera_path: third_party/HUGSIM-ORI/configs/sim/nuscenes_camera.yaml
    kinematic_path: third_party/HUGSIM-ORI/configs/sim/kinematic.yaml
    model_base: /OpenDataset/HUGSIM_data/scenes/nuscenes
    launch_mode: fifo
    pixi_cmd: pixi
    fifo_timeout_s: 300
    fifo_poll_interval_s: 0.2
    output_root: outputs/hugsim_rl
    recon_data_root: /root/clone/ReconDreamer-RL/assets/nus/data
    nuscenes_root: /root/clone/ReconDreamer-RL/assets/nuscenes/v1.0-trainval
    frame2token_dir: /root/clone/ReconDreamer-RL/assets/nus/information/frame2token
    alignment:
      enabled: true
      max_rmse_m: 2.0
      use_recon_cache_objects: true
      use_hugsim_inserted_objects: true
  reward:
    mode: step_path
    dt: 0.5
    CRAFT:
      enable: true
      real_reward_model: close loop
      corrective_progress:
        enable: true
        weight: 0.4
        max_m: 1.2
        min_m: 0.0
        lateral_safe_m: 0.3
        lateral_max_m: 2.5
        heading_max_deg: 60.0
        w_lateral_efficiency: 1.5
        w_heading_efficiency: 1.0
        efficiency_floor: 0.0
      corrective:
        cost_off_road: 0.5
        cost_emergency_lane: 0.2
        cost_off_global_route: 0.0
        cost_red_light: 2.0
        cost_stop_sign: 2.0
        cost_collision: 5.0
      map:
        center_dev_max_m: 2.0
        heading_dev_max_deg: 90.0
        reverse_dot_threshold: -0.5
        same_dir_dot_threshold: 0.2
        same_dir_distance_margin_m: 0.75
    path:
      interp_ds_m: 0.25
      w_progress: 1.0
      progress_forward_cap_m: 2.0
      progress_backward_cap_m: 0.5
      w_lateral: 0.25
      lateral_free_m: 0.3
      lateral_huber_delta_m: 0.5
      w_yaw: 0.1
      yaw_free_deg: 5.0
      yaw_huber_delta_deg: 10.0
    comfort:
      w_longitudinal_jerk: 0.01
      longitudinal_jerk_free: 1.5
      longitudinal_jerk_delta: 2.0
      w_yaw_jerk: 0.01
      yaw_jerk_free: 0.2
      yaw_jerk_delta: 0.3
      jerk_clip: 50.0
    collision:
      mode: constraint_gate
      w_static: 5.0
      w_dynamic: 5.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 25.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      penalty: 0.0
      success_bonus: 0.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5
      xy_err_patience_steps: 4
train:
  wandb:
    enabled: true
    project: ReconDiff
    group: HUGSIM_CloseCloseloop_OpenGRPOCraft_FullPara
  algo: reinforcepp
  eta: 1.0
  mode_idx: -1
  policy_mode_select: sample
  policy_execute_mode: first_step
  max_grad_norm: 0.5
  policy_lr: 3.0e-06
  clip_eps: 0.2
  actor_learner:
    mode: async
    buffer_dir: /root/clone/ReconDreamer-RL/outputs/actor_learner/HUGSIM_CloseCloseloop_OpenGRPOCraft_FullPara
    timestamp_buffer_dir: true
    # learner_gpu_id: 0
    learner_gpu_id: 0
    # learner_gpu_ids:
    #   - 0
    #   - 1
    actor_gpu_pool:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    actors_per_gpu: 4
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 32
    num_envs_per_actor: 1
    vec_env_mode: serial
    max_shard_version_lag: 2
    shards_per_update: 24
    poll_interval_s: 0.1
    shard_collect_timeout_s: 60
    max_updates: 32
  minibatch_size: 4
  gamma: 0.99
  ddp:
    grad_accum_steps: 8
  grpo:
    enable: false
    config_path: null
    coef: 1.0
    num_candidates: 8
    candidate_select: topk
    objective: expected_prob
    temperature: 1.0
    norm_eps: 1.0e-06
    use_rank_adv: false
    score_clip: null
    debug_visualize: false
    debug_dir: outputs/visualize/HUGSIM_CloseCloseloop_OpenGRPOCraft_FullPara
    debug_max_batches: 24
    debug_top_k: 8
  reinforcepp:
    norm_eps: 1.0e-08
    kl_coef: 0.0
    epochs: 1
    policy_grad_weight: 0.5
    forward_kl_coef: 0.0
    reverse_kl_coef: 0.5
    distill_temperature: 1.0
agent:
  type: sparsedrive_v2
  ckpt: SparseDriveV2/ckpt/sparsedrive_navsimv2.ckpt
  trainable_prefixes: []
  frozen_prefixes: [_backbone]
  nuscenes_scorer:
    backend: craft_carl
    scene_cache_root: /root/clone/ReconDreamer-RL/assets/nus/cache
    ea_gate_enabled: false
    driving_direction_gate_enabled: false
    center_dev_max_m: 2.0
    heading_dev_max_deg: 90.0
    off_global_route_threshold_m: 100.0
    carl:
      dp_min: 0.0
      dp_max: 1.2
      w_prog: 8.0
      w_g: 3.0
      w_c: 0.8
      w_h: 2.0
      efficiency_floor: 0.0
      ddev_clip: 0.1
      k_g: 0.4
      k_c: 0.2
      k_h: 0.4
      correction_apply_thresh_global: 0.08
      correction_apply_thresh_center: 0.08
      corr_clip: 0.5
      cost_off_road: 1.5
      cost_opposite_lane: 0.1
      cost_off_global_route: 0.0  #关掉假的 路点引导
      cost_emergency_lane: 1.0
      term_collision: 40.0
      term_route_dev: 40.0
      term_red_light: 40.0
      term_stop_sign: 40.0
