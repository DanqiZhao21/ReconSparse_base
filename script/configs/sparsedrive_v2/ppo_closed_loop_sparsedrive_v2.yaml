env:
  max_steps: 36
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  require_ckpt: true
  scene_sampling: random
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  reward:
    mode: step
    dmax: 2.0
    psi_max_deg: 30.0
    w_dynamic: 5.0
    w_static: 5.0
    w_pos: 0.25
    w_heading: 0.1
    w_longitudinal_jerk: 0.01
    w_yaw_jerk: 0.01
    jerk_clip: 50.0
    dt: 0.5
    rpd_cap: 5.0
    rhd_cap: 5.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 5.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      penalty: -15.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5
      xy_err_patience_steps: 1

train:
  wandb:
    enabled: true
    project: ReconDiff
    group: ppo_closed_loop_sparsedrive_v2

  algo: ppo
  eta: 1.0
  mode_idx: -1

  policy_mode_select: sample
  policy_execute_mode: first_step
  max_grad_norm: 0.5
  policy_lr: 3.0e-5

  actor_learner:
    mode: async
    buffer_dir: outputs/actor_learner
    learner_gpu_id: 0
    actor_gpu_pool: [1, 2, 3] #FIXME:
    actors_per_gpu: 8   #FIXME:
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 32
    num_envs_per_actor: 1
    # shards_per_update: 128  #128*32=4096 steps/update#FIXME:
    shards_per_update: 24
    poll_interval_s: 0.2
    max_updates: 50

  vf_coef: 0.5
  lr_value: 1.0e-4
  critic_use_agent_features: true
  critic_hidden_dim: 256
  epochs: 2
  # minibatch_size: 64
  minibatch_size: 4
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  ppo:
    forward_kl_coef: 0.2
    reverse_kl_coef: 0.5
    distill_temperature: 1.0

  ddp:
    grad_accum_steps: 16
    seed: 42

agent:
  type: sparsedrive_v2
  ckpt: SparseDriveV2/ckpt/sparsedrive_navsimv2.ckpt
  trainable_prefixes: [_trajectory_head.decoder.layers.1.metric_heads]
  # RL uses candidate_scores, which come from _trajectory_head.decoder.layers.1.metric_heads in SparseDriveV2.
  # If you explicitly want only the trajectory classification head instead, use:
  # trainable_prefixes: [_trajectory_head.decoder.layers.1.traj_mlp]
