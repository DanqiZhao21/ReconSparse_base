env:
  backend: hugsim_ori
  max_steps: 30
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  scene_sampling: sequential
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  hugsim:
    repo: /root/clone/HUGSIM-ORI
    scenario_dir: /root/clone/HUGSIM-ORI/configs/scenarios/nuscenes
    scenes:
      - scene-0013
    base_path: /root/clone/HUGSIM-ORI/configs/sim/nuscenes_eval_sparsedrive_v2_ppo_grpo_ver14.yaml
    camera_path: /root/clone/HUGSIM-ORI/configs/sim/nuscenes_camera.yaml
    kinematic_path: /root/clone/HUGSIM-ORI/configs/sim/kinematic.yaml
    model_base: /OpenDataset/HUGSIM_data/scenes/nuscenes
    launch_mode: fifo
    pixi_cmd: pixi
    fifo_timeout_s: 300
    fifo_poll_interval_s: 0.2
    substeps_per_rl_step: 2
    output_root: outputs/hugsim_rl
    recon_data_root: /root/clone/ReconDreamer-RL/assets/nus/data
    nuscenes_root: /root/clone/ReconDreamer-RL/assets/nuscenes/v1.0-trainval
    frame2token_dir: /root/clone/ReconDreamer-RL/assets/nus/information/frame2token
  reward:
    mode: step_path
    dt: 0.5
train:
  wandb:
    enabled: false
    project: ReconDiff
    group: hugsim_ori_sparsedrive_v2_smoke
  algo: reinforcepp
  eta: 1.0
  mode_idx: -1
  policy_mode_select: sample
  policy_execute_mode: first_step
  max_grad_norm: 0.5
  policy_lr: 3.0e-06
  clip_eps: 0.2
  actor_learner:
    mode: async
    buffer_dir: /root/clone/ReconDreamer-RL/outputs/actor_learner/HUGSIM_ORI_SparseDriveV2_Smoke
    timestamp_buffer_dir: true
    learner_gpu_id: 0
    actor_gpu_pool:
      - 0
    actors_per_gpu: 1
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: false
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 8
    num_envs_per_actor: 1
    vec_env_mode: serial
    max_shard_version_lag: 2
    shards_per_update: 1
    poll_interval_s: 0.1
    shard_collect_timeout_s: 60
    max_updates: 1
  minibatch_size: 1
  gamma: 0.99
  ddp:
    grad_accum_steps: 1
  grpo:
    enable: false
    config_path: null
    coef: 0.0
    num_candidates: 1
    candidate_select: topk
    objective: expected_prob
    temperature: 1.0
    norm_eps: 1.0e-06
    use_rank_adv: false
    score_clip: null
    debug_visualize: false
    debug_dir: outputs/visualize/hugsim_ori_sparsedrive_v2_smoke
    debug_max_batches: 1
    debug_top_k: 1
  reinforcepp:
    norm_eps: 1.0e-08
    kl_coef: 0.0
    epochs: 1
    policy_grad_weight: 0.5
    forward_kl_coef: 0.0
    reverse_kl_coef: 0.5
    distill_temperature: 1.0
agent:
  type: sparsedrive_v2
  ckpt: SparseDriveV2/ckpt/sparsedrive_navsimv2.ckpt
  trainable_prefixes: [_trajectory_head.decoder.layers.1.metric_heads]
  frozen_prefixes: [_backbone]
  nuscenes_scorer:
    backend: craft_carl
    scene_cache_root: /root/clone/ReconDreamer-RL/assets/nus/cache
    ea_gate_enabled: false
    driving_direction_gate_enabled: false
