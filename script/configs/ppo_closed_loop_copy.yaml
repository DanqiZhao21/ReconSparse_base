model:
  image_architecture: resnet34
  image_in_chans: 3
  lidar_architecture: resnet34
  tf_d_model: 256
  tf_num_head: 8
  tf_d_ffn: 1024
  tf_dropout: 0.1
  tf_num_layers: 2
  num_bounding_boxes: 32
  num_groups: 4
  trajectory_sampling:
    num_poses: 8
  plan_anchor_path: /root/clone/ReconDreamer-RL/DiffusionDriveV2/ckpt/resnet34.a1_in1k/kmeans_navsim_traj_20.npy
  bkb_path: /root/clone/ReconDreamer-RL/DiffusionDriveV2/ckpt/resnet34.a1_in1k/pytorch_model.bin
  bev_features_channels: 256
  num_bev_classes: 20
  lidar_resolution_height: 256
  lidar_resolution_width: 256

env:
  cuda: 0
  scene: 0
  max_steps: 60
  debug: False
  # Speed knobs (rollout is often bottlenecked by GPU rendering in the env):
  # - render_w/render_h: lower image resolution per camera to speed up rendering
  # - step_frames: advance by N keyframes per step (frame-skip); higher is faster but changes dynamics
  #   (Keep None/omit for default=1)
  render_w: 800
  render_h: 450
  # step_frames: 2
  # Episode start frame control within each scene:
  # - mode: zero (always from frame 0) | random (start from a random frame) | sequential (slide window)
  # - allow_short_tail: if false, only sample frames that leave >= max_steps remaining
  start_frame:
    mode: random
    allow_short_tail: false
    min: 0
    # stride: 64
    # max: 120
  # Use all scenes under assets/nus/data; sample scene per episode
  use_all_scenes: true
  scene_sampling: random  # random | sequential
  reward:
    # Reward modes:
    # - step: per-step four-component + optional jerk
    # - episode: per-episode jerk (per-step reward=0)，阈值/碰撞仍会触发即时终止
    mode: step
    dmax: 2.0              # meters, positional deviation threshold
    psi_max_deg: 30.0      # degrees, heading deviation threshold
    w_dynamic: 5.0         # penalty for dynamic collision
    w_static: 5.0          # penalty for static collision
    w_pos: 2.0             # penalty for exceeding dmax
    w_heading: 1.0         # penalty for exceeding psi_max

    # Smoothness (jerk) terms
    dt: 0.1
    w_longitudinal_jerk: 0.05
    w_yaw_jerk: 0.05
    jerk_clip: 50.0

    # Step-level reward logging to Weights & Biases
    logging:
      wandb:
        enable: true
        prefix: rl

    # Optional sparse terminal penalty + early termination ("gameover") based on tracking error.
    # If enabled and thresholds are exceeded, env will set terminated=True and include
    # done_reason / terminal_penalty in info["episode_metrics"].
    terminal:
      enable: true
      # Trigger early termination when error exceeds thresholds (if info provides xz_err_m/yaw_err_deg).
      xz_err_m_max: 5.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      # Added to episode_reward when applied (keep single scalar reward).
      penalty: -5.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5  # number of consecutive steps exceeding yaw_err_deg_max before termination
      xy_err_patience_steps: 1
train:
  # algo options (closed-loop training on DiffusionDriveV2-RL planner):
  # - ddv2_rl_reinforce: episode-level REINFORCE (update once per episode)
  # - ddv2_rl_ppo: episode-level PPO (GAE + value baseline, update on a batch of episodes)
  # Note: `ppo` (anchor-space baseline) still exists, but ddv2 training uses the two modes above.
  algo: ddv2_rl_ppo
  ddv2_eta: 1.0
  # ddv2_mode_idx: 0 # Choose a fixed trajectory mode index (0-based) from DDV2's multi-modal outputs.
  # Use -1 to auto-select trajectory mode by logp softmax (adds exploration)
  # Recommended for learning signal diversity
  ddv2_mode_idx: -1
  # How to pick a mode when ddv2_mode_idx < 0:
  # - sample: sample from softmax(mode_logps) (default, reproducible under fixed seed)
  # - greedy: pick argmax(mode_logps) (more stable, less exploration)
  ddv2_mode_select: greedy
  ddv2_max_grad_norm: 0.5

  # Reproducibility knobs
  # - seed: base seed for python/numpy/torch + scene/start_frame sampling (DDP: seed + rank)
  # - deterministic: set cudnn deterministic (may slow down)
  seed: 42
  deterministic: false

  # Per-rank multi-environment rollout (subprocess workers)
  # Speeds up closed-loop collection by parallelizing env stepping.
  # Tip: set num_envs to a small number per rank (e.g., 2~8) and ensure you have enough CPU.
  vec_env:
    # IMPORTANT for GPU neural-rendering envs:
    # - backend=serial avoids subprocess spawn/CUDA init deadlocks
    # - increase num_envs gradually (2 -> 4) to avoid VRAM/CPU pressure
    backend: serial   # serial | subproc
    num_envs: 2
    start_method: spawn
    # CLI progress logging for vectorized rollout
    log_progress: false
    log_interval_s: 5.0
    log_max_envs: 4

  # Actor-Learner (recommended for this GPU neural-rendering env)
  # Run via: tools/train_actor_learner.sh
  actor_learner:
    # sync:   actors roll fixed horizon, learner waits all actors then updates, then actors continue
    # async:  actors keep writing shards; learner continuously consumes and updates
    # mini_sync: same as sync but with smaller horizon / more frequent updates
    # mode: sync
    mode: async
    buffer_dir: outputs/actor_learner
    num_actors: 2
    actor_horizon: 40
    # For async/mini_sync: learner updates every N shards (default=num_actors)
    shards_per_update: 24
    max_inflight_per_actor: 15
    poll_interval_s: 0.2
    # wand_actors: false
    wand_actors: true
  batch_episodes: 4096
  vf_coef: 0.5
  lr: 2.0e-4
  lr_value: 1.0e-4
  epochs: 2
  updates: 15
  horizon: 64
  minibatch_size: 64
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  out_dir: outputs/ppo_closed_loop
  save_video: false
  video_path: outputs/ppo_closed_loop/episode.mp4
  fps: 10
  draw_traj_overlay: true
  # Training video can get huge; cap frames written.
  max_video_frames: 64 #horizon=64 → 每个更新收集 64 步数据;最多也只写入64帧
  # If use_ddv2=true, PPO can add a Gaussian prior centered on DDV2's suggested anchor.
  guidance_weight: 1.0
  guidance_sigma: 4.0
  # Sanity check: log parameter change after each update.
  assert_update: true

  # Multi-GPU settings (torchrun)
  # Recommended default: do NOT all_gather rollout/replay (replay can be huge).
  # Let DDP aggregate gradients instead.
  ddp:
    backend: nccl
    grad_accum_steps: 1
    gather_rollout: false
    gather_ddv2_replay: false
    seed: 42

  # Replay buffer memory optimization.
  # - storage_dtype: dtype used when storing tensors in RAM / (future) disk cache
  # - compute_dtype: dtype used when feeding tensors back into the model
  # Recommended: store camera_feature in fp16, compute in fp32 for stability.
  replay:
    storage_dtype:
      camera_feature: fp16
      diffusion_chain: fp32
    compute_dtype:
      camera_feature: fp32
      diffusion_chain: fp32

  # Weights & Biases logging
  wandb:
    enabled: true
    project: ReconDreamerRL
    run_name: ddv2_ppo_closed_loop

  # Periodic checkpoint saving of updated DDV2 weights
  save:
    every: 3
    upload_to_wandb: false
    upload_final_to_wandb: true

  # DDV2 optimizer settings
  ddv2_lr: 3.0e-4
  ddv2_baseline_beta: 0.98

agent:
  use_ddv2: true
  ckpt: /root/clone/ReconDreamer-RL/DiffusionDriveV2/ckpt/diffusiondrivev2_rl.ckpt

eval:
  save_video: true
  video_path: outputs/ppo_closed_loop/eval_episode.mp4
  fps: 10
  draw_traj_overlay: true
