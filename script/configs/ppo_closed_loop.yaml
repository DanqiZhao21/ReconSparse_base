env:
  scene: 0
  # 18s max at dt=0.5s (step_frames=5) => 36 env.steps per episode
  max_steps: 36
  # NuScenes keyframe spacing: 10Hz base -> step_frames=5 means 0.5s per env.step
  step_frames: 5
  debug: False
  render_w: 800
  render_h: 450
  start_frame:
    mode: random
    allow_short_tail: false
    min: 0
  use_all_scenes: true
  require_ckpt: true
  scene_sampling: random  # random | sequential
  reward:
    mode: step
    dmax: 2.0              # meters, positional deviation threshold
    psi_max_deg: 30.0      # degrees, heading deviation threshold
    w_dynamic: 5.0         # penalty for dynamic collision
    w_static: 5.0          # penalty for static collision
    w_pos: 2.0             # penalty for exceeding dmax
    w_heading: 1.0         # penalty for exceeding psi_max
    # Must match env.step wall-clock: step_frames=5 => dt=0.5s
    dt: 0.5
    w_longitudinal_jerk: 0.05
    w_yaw_jerk: 0.05
    jerk_clip: 50.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 5.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      penalty: -5.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5  # number of consecutive steps exceeding yaw_err_deg_max before termination
      xy_err_patience_steps: 1
train:
  # Algorithm switch: ppo | reinforcepp
  algo: ppo
  # Actor-Learner reads only a subset of keys under train.*
  # Total learner update count (i.e., weights_version bump次数). Used as fallback if actor_learner.max_updates is not set.
  updates: 50
  ddv2_eta: 1.0
  ddv2_mode_idx: -1
  ddv2_mode_select: greedy
  ddv2_max_grad_norm: 0.5
  seed: 42
  actor_learner:
    mode: async
    buffer_dir: outputs/actor_learner
    # num_actors: 2
    num_actors: 2
    # NOTE(actor_horizon): after introducing commit_steps, actor_horizon counts *macro decisions*.
    # Effective env steps per shard ≈ actor_horizon * commit_steps (within an episode, capped by env.max_steps).
    # With dt=0.5s, max_steps=36 => 18s per episode. With commit_steps=4, set actor_horizon<=9 to fit one episode.
    actor_horizon: 9 # macro steps; 9*4=36 env.steps (~18s)
    # Buffer size note: the stored samples are macro transitions (one per sampled plan), not raw env steps.
    #192/16/2=6  每个actor采样6个shard
    # Multi-env per actor (same GPU) to improve DDV2 inference throughput.
    # Warning: each env instance may consume significant GPU memory.
    num_envs_per_actor: 16 #8
    # serial: in-process (recommended with CUDA); subproc: separate processes (may be fragile)
    commit_steps: 4 #K：每次采样一条DDV2轨迹(plan)后，连续执行其前K个点(=K次env.step)，期间不重新采样；然后将这K步聚合成1条macro transition写入buffer。建议K<=DDV2轨迹点数H(通常8)。
    vec_env_mode: serial
    # shards_per_update: 24
    shards_per_update: 192 #1024  64  32*16=512条轨迹
    max_inflight_per_actor: 2048 #515
    poll_interval_s: 0.2
    # Stop condition: run this many learner updates (weights_version bumps) then exit and signal actors.
    # Set <=0 to disable (infinite). 最多更新的次数
    max_updates: 50
    wandb_actors: true
    wandb_log_every_steps: 1

  vf_coef: 0.5
  lr_value: 1.0e-4
  epochs: 2
  minibatch_size: 64
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95

  ddp:
    grad_accum_steps: 1
    seed: 42

  replay:
    compute_dtype:
      camera_feature: fp32
      diffusion_chain: fp32

  wandb:
    enabled: true
    project: ReconDreamerRL
    run_name: ddv2_actor_learner
    # group: ddv2_actor_learner

  save:
    upload_to_wandb: false

  ddv2_lr: 3.0e-4
  ddv2_baseline_beta: 0.98

  #NOTE Reinforce++ (critic-free) settings (only used when train.algo: reinforcepp)
  reinforcepp:
    # Global Advantage Normalization epsilon
    norm_eps: 1.0e-8
    # KL regularization to a fixed reference policy (0 disables and avoids loading ref policy)
    kl_coef: 0.0
    # Optional explicit reference checkpoint; default is agent.ckpt
    # ref_ckpt: /path/to/reference.ckpt
    # Extra epochs over the same data are usually not recommended for REINFORCE-style updates.
    epochs: 1
    #对同一 batch 数据做多少轮更新——REINFORCE 是 高方差策略梯度，重复使用同一数据容易导致方差爆炸;
    # Baseline variant inspired by Reinforce++w/ Baseline:
    # - none: no group baseline
    # - scene: subtract per-scene mean return before global std normalization
    group_baseline: none #分组基线（baseline）——减少训练方差，提高稳定性

agent:
  ckpt: DiffusionDriveV2/ckpt/diffusiondrivev2_rl.ckpt
