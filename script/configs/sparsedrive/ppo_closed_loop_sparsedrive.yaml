env:
  max_steps: 36
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true
  require_ckpt: true
  scene_sampling: random
  start_frame:
    mode: zero
    allow_short_tail: false
    min: 0
  reward:
    mode: step_path
    dt: 0.5
    path:
      interp_ds_m: 0.25
      w_progress: 1.0
      progress_forward_cap_m: 2.0
      progress_backward_cap_m: 0.5
      w_lateral: 2.0
      lateral_free_m: 0.3
      lateral_huber_delta_m: 0.5
      w_yaw: 1.0
      yaw_free_deg: 5.0
      yaw_huber_delta_deg: 10.0
      severe_lateral_error_m: 3.0
      severe_yaw_error_deg: 30.0
      severe_lateral_cost: 3.0
      severe_yaw_cost: 2.0
      severe_gate_scale: 0.0
    comfort:
      w_longitudinal_jerk: 0.05
      longitudinal_jerk_free: 1.5
      longitudinal_jerk_delta: 2.0
      w_yaw_jerk: 0.05
      yaw_jerk_free: 0.2
      yaw_jerk_delta: 0.3
      jerk_clip: 50.0
    collision:
      mode: constraint_gate
      gate_scale: 0.0
      w_static: 5.0
      w_dynamic: 5.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 25.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      penalty: -5.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5
      xy_err_patience_steps: 4

train:
  wandb:
    enabled: true
    project: ReconDiff
    group: ppo_closed_loop_sparsedrive

  algo: ppo
  # Keep these two keys for compatibility with existing learner code.
  eta: 1.0
  mode_idx: -1

  # Generic policy switches (new):
  policy_mode_select: sample
  policy_execute_mode: first_step
  ddv2_max_grad_norm: 0.5
  policy_lr: 3.0e-5

  actor_learner:
    mode: async
    buffer_dir: outputs/actor_learner
    learner_gpu_id: 0
    actor_gpu_pool: [0, 1, 2, 3]
    actors_per_gpu: 2
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true
    scene_shard_strategy: round_robin
    actor_horizon: 32
    num_envs_per_actor: 2
    vec_env_mode: serial
    shards_per_update: 128
    poll_interval_s: 0.2
    max_updates: 50

  vf_coef: 0.5
  lr_value: 1.0e-4
  epochs: 2
  minibatch_size: 64
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  grpo:
    enable: false
    config_path: null
    coef: 0.0
    num_candidates: 8
    candidate_select: topk
    norm_eps: 1.0e-6
    use_rank_adv: false
    score_clip: null
    # debug_visualize: false
    debug_visualize: true #FIXME:
    debug_dir: outputs/visualize/grpo_nuscenes
    debug_max_batches: 0
    debug_top_k: 4

  ddp:
    grad_accum_steps: 1
    seed: 42

agent:
  type: sparsedrive
  config: SparseDrive/projects/configs/sparsedrive_small_stage2.py
  ckpt: SparseDrive/ckpt/sparsedrive_stage2.pth
