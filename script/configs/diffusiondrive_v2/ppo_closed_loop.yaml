env:
  max_steps: 36
  # NuScenes keyframe spacing: 10Hz base -> step_frames=5 means 0.5s per env.step.
  step_frames: 5
  debug: false
  render_w: 800
  render_h: 450
  use_all_scenes: true #使用全量场景：actor 会按 scene shard 规则去分全量场景
  require_ckpt: true #只使用有 splat checkpoint 的 scene
  scene_sampling: random #每次 reset 从 actor 的 scene 子集里随机选
  start_frame:   #reset 时起始帧怎么选；实际处理在 subproc_vec_env.py:102-163；zero（默认）:每次episode都从0帧开始； random:随机 start frame，但使用 deterministic seed。seq：（顺序滑动窗口）
    mode: zero #TODO: 综合考虑一下是使用random还是zero
    allow_short_tail: false #是否允许起点靠近序列末尾，导致后面不足一个完整 episode 长度;所以起点会约束到还能完整跑完 max_steps 的位置。
    min: 0
  reward:
    mode: step_path
    dt: 0.5
    path:
      interp_ds_m: 0.25
      w_progress: 1.0
      progress_forward_cap_m: 2.0
      progress_backward_cap_m: 0.5
      w_lateral: 2.0
      lateral_free_m: 0.3
      lateral_huber_delta_m: 0.5
      w_yaw: 1.0
      yaw_free_deg: 5.0
      yaw_huber_delta_deg: 10.0
      severe_lateral_error_m: 3.0
      severe_yaw_error_deg: 30.0
      severe_gate_scale: 0.0
      w_anchor_progress: 0.0
      w_anchor_lateral: 0.0
      anchor_free_m: 0.2
      anchor_cap_m: 1.0
    comfort:
      w_longitudinal_jerk: 0.05
      longitudinal_jerk_free: 1.5
      longitudinal_jerk_delta: 2.0
      w_yaw_jerk: 0.05
      yaw_jerk_free: 0.2
      yaw_jerk_delta: 0.3
      jerk_clip: 50.0
    collision:
      mode: constraint_gate
      gate_scale: 0.0
      w_static: 5.0
      w_dynamic: 5.0
    logging:
      wandb:
        enable: true
        prefix: rl
    terminal:
      enable: true
      xz_err_m_max: 5.0
      yaw_err_deg_max: 45.0
      terminate_on_xz_err: true
      terminate_on_yaw_err: true
      terminate_on_static_collision: true
      terminate_on_dynamic_collision: true
      #一下四个可以考虑是否删除
      penalty: -5.0
      apply_on_failure: true
      apply_on_timeout: false
      apply_on_env_done: false
      yaw_err_patience_steps: 5
      xy_err_patience_steps: 1

####################################################################################################
train:
  # Weights & Biases logging (handled in script/train_actor_learner_v2.py learner rank0)
  wandb:
    enabled: true
    project: ReconDiff
    # entity: 2564380679
    group: ppo_closed_loop
    # name: optional; default is learner_YYYYmmdd_HHMMSS
    # mode: online | offline | disabled


  algo: ppo
  eta: 1.0
  mode_idx: -1
  ddv2_mode_select: greedy
  policy_execute_mode: first_step
  ddv2_max_grad_norm: 0.5  #训练时的梯度裁剪上限
  ddv2_lr: 3.0e-4

  actor_learner:
    mode: async #不等“每个 actor 都交一份,只要累计到 shards_per_update 个 shard 就开训
    buffer_dir: outputs/actor_learner #GPU0 上的 actor 在 learner 训练阶段会暂停，其他卡上的 actor 继续采样
    learner_gpu_id: 0
    # Compact actor placement:
    # - actor_gpu_pool: which GPUs are allowed
    # - actors_per_gpu: number of actor processes per GPU
    # - num_envs_per_actor: number of envs coordinated inside each actor
    # The script will auto-generate num_actors + actor_gpu_ids.
#FIXME:
    actor_gpu_pool: [0, 1, 2, 3]
    actors_per_gpu: 2
    # Auto-tune max_inflight_per_actor to avoid async deadlock
    # (ensures num_actors * max_inflight_per_actor >= shards_per_update).
    auto_max_inflight_per_actor: true
    pause_actor_on_learner_gpu: true
    scene_shard_by_actor: true #是否按 actor 把场景池切片，减少不同 actor 重复采样同一 scene
    scene_shard_strategy: round_robin #按索引轮转分配给不同 actor;还有另一种策略：scene_shard_strategy = "contig"连续 chunk
    # One shard stores actor_horizon policy decisions / env steps.
    actor_horizon: 32
    # Safe batched actor default: fewer actor processes, more envs per actor.
    num_envs_per_actor: 2
    vec_env_mode: serial
    # In async mode, learner updates once this many shards are available.
#FIXME:
    shards_per_update: 128
    # shards_per_update: 32
    # Optional manual override; otherwise auto-tuned.
    # max_inflight_per_actor: 16
    poll_interval_s: 0.2
#FIXME:
    max_updates: 50
    # max_updates: 4

  vf_coef: 0.5
  lr_value: 1.0e-4
  epochs: 2 #NOTE: PPO 每次 update 对同一批数据过几轮。读取点在 subproc_vec_env.py:165-175
  minibatch_size: 64 #Learner update 时每个 minibatch 的大小 ;
  clip_eps: 0.2 
  gamma: 0.99
  gae_lambda: 0.95
  grpo:
    enable: false
    config_path: null
    coef: 0.0
    num_candidates: 8
    candidate_select: topk
    norm_eps: 1.0e-6
    use_rank_adv: false
    score_clip: null
    debug_visualize: false
    debug_dir: outputs/visualize/grpo_nuscenes
    debug_max_batches: 0
    debug_top_k: 4

  ddp:
    grad_accum_steps: 1
    seed: 42

agent:
  ckpt: DiffusionDriveV2/ckpt/diffusiondrivev2_rl.ckpt
